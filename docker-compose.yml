# Один конфиг для прода и сервера: свой Postgres + приложение.
# Сервер: docker compose up -d --build  (порт 3001, чтобы не пересекаться с другим сайтом).
# Логи: docker compose logs -f app

name: scrooge-donat

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-89069813784Zaqq123}
      POSTGRES_DB: donations
    volumes:
      - pgdata_donat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d donations"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-89069813784Zaqq123}@db:5432/donations
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://scrooge-donat.ru}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL:-https://scrooge-donat.ru}
      AUTH_TRUST_HOST: "true"
      TRUST_PROXY: "true"
      COOKIE_SECURE: "true"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

volumes:
  pgdata_donat:
