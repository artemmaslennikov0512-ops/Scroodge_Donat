# Режим разработки: исходники монтируются, изменения видны без пересборки.
# Только для локальной разработки. На сервере НЕ использовать — иначе запустится next dev
# вместо node server.js и будет 502 (порт 3001 в контейнере, а маппинг 3001:3000).
# На VPS: mv docker-compose.override.yml docker-compose.override.yml.disabled
# Запуск: docker compose up --build -d
# Логи: docker compose logs -f app

name: donation-site

services:
  app:
    build:
      context: .
      target: builder
    tty: true
    stdin_open: true
    command: sh -c "npx prisma generate && echo '[app] Starting dev server...' && npm run dev"
    environment:
      NODE_ENV: development
    volumes:
      - ./app:/app/app
      - ./components:/app/components
      - ./lib:/app/lib
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./infrastructure:/app/infrastructure
      - ./application:/app/application
      - ./middleware.ts:/app/middleware.ts
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"
