# Только scrooge-donat.ru. Не трогать конфиг free-tips.ru (отдельный файл на сервере).
# На VPS: sudo cp этот файл в /etc/nginx/sites-available/scrooge-donat
# Симлинк: ln -sf /etc/nginx/sites-available/scrooge-donat /etc/nginx/sites-enabled/
# Сертификат и ключ с Beget — в /etc/nginx/ssl/ (см. docs/SSL-BEGET-NA-VPS.md)

# HTTP — редирект на HTTPS; /.well-known — для продления certbot без остановки nginx
server {
    listen 80;
    server_name scrooge-donat.ru www.scrooge-donat.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — только этот домен, сертификат Let's Encrypt (certbot), бэкенд порт 3001
server {
    listen 443 ssl;
    server_name scrooge-donat.ru www.scrooge-donat.ru;

    ssl_certificate     /etc/letsencrypt/live/scrooge-donat.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scrooge-donat.ru/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
