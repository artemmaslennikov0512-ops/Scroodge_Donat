# Шаг 1: только порт 80 для выпуска сертификата (certbot --webroot).
# Nginx не останавливаем. После получения серта ставишь основной scrooge-donat.conf.
# Важно: этот файл должен быть в sites-enabled, иначе запросы перехватит другой server и будет 301.

server {
    listen 80;
    server_name scrooge-donat.ru www.scrooge-donat.ru;

    # Сначала acme-challenge — без редиректа, иначе certbot не пройдёт
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
